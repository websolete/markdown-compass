<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Enhanced M-Compass design for main icon -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)" />
  
  <!-- Compass ring -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="white" stroke-width="2.5" filter="url(#dropShadow)" />
  
  <!-- Main directional spikes -->
  <path fill="white" stroke="white" stroke-width="2" d="M64 10v18M64 100v18M118 64h-18M28 64H10" />
  
  <!-- Diagonal indicators -->
  <path fill="white" d="M100 28l-10 10M100 100l-10-10M28 100l10-10M28 28l10 10" />
  
  <!-- North indicator -->
  <path fill="white" d="M64 10l5 8h-10z" />
  
  <!-- Center dot -->
  <circle cx="64" cy="64" r="6" fill="white" />
  
  <!-- Inverted M (flipped vertically) with enhanced styling -->
  <path fill="white" d="M42 82V42h12l10 14 10-14h12v40H74V60L64 74 54 60v22z" filter="url(#dropShadow)" />
</svg>
