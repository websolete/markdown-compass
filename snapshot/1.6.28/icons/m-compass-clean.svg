<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- M superimposed over compass design with map-like directional indicators -->
  <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
  
  <!-- Main directional spikes (longer and more prominent) -->
  <path fill="currentColor" stroke="currentColor" stroke-width="1.5" d="M12 2v4M12 18v4M22 12h-4M6 12H2"/>
  
  <!-- Diagonal indicators -->
  <path fill="currentColor" d="M18 6l-2 2M18 18l-2-2M6 18l2-2M6 6l2 2"/>
  
  <!-- North indicator -->
  <path fill="currentColor" d="M12 2l1 2h-2z"/>
  
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
  
  <!-- Inverted M (flipped vertically) -->
  <path fill="currentColor" d="M8 15.5v-7h2.5l1.5 2 1.5-2H16v7h-2v-5l-2 3-2-3v5z"/>
</svg>
